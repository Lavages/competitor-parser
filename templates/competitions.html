<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afterglow Explorer • Wiigii's WCA</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Permanent+Marker&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.cubing.net/v0/css/@cubing/icons/css">

    <style>
        :root {
            --afterglow-red: #e60012;
            --afterglow-dark: #121212;
            --afterglow-accent: #2a2a2a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #080808;
            background-image: radial-gradient(circle at 50% 50%, #1a0505 0%, #080808 100%);
        }

        .afterglow-title {
            font-family: 'Permanent Marker', cursive;
            color: var(--afterglow-red);
            text-shadow: 3px 3px 0px #000, 0 0 10px rgba(230, 0, 18, 0.4);
        }

        .nav-active {
            color: var(--afterglow-red) !important;
            border-bottom: 3px solid var(--afterglow-red);
            text-shadow: 0 0 8px rgba(230, 0, 18, 0.6);
        }

        /* Punk-style tags */
        .brand-tag {
            background-color: var(--afterglow-red);
            color: white;
            padding: 2px 10px;
            transform: rotate(-2deg);
            display: inline-block;
            box-shadow: 3px 3px 0px #000;
        }

        .event-icon {
            font-size: 2rem;
            vertical-align: middle;
            display: inline-block;
            margin-right: 4px;
            transition: transform 0.2s;
        }

        .event-btn-active {
            border-color: var(--afterglow-red) !important;
            background-color: rgba(230, 0, 18, 0.15) !important;
            box-shadow: 0 0 15px rgba(230, 0, 18, 0.3), inset 0 0 10px rgba(230, 0, 18, 0.1);
            transform: translateY(-2px);
        }

        /* Custom scrollbar for that Afterglow red */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--afterglow-red);
            border-radius: 3px;
        }

        .scrollable-events {
            max-width: 300px;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 0;
            scrollbar-width: thin;
        }

        .glass-panel {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #match-mode-toggle:checked+.block+.dot {
            transform: translateX(1.5rem);
            background-color: var(--afterglow-red);
        }

        .comp-link:hover {
            color: var(--afterglow-red);
            text-decoration: underline wavy;
        }
    </style>
</head>

<body class="min-h-screen text-gray-100 p-2 sm:p-4 flex flex-col items-center">

    <nav
        class="w-full max-w-5xl mx-auto glass-panel rounded-t-2xl p-3 sm:p-4 flex flex-wrap justify-center items-center gap-3 sm:gap-6 sticky top-0 z-50 border-b border-red-900/30">
        <a href="/"
            class="text-xs font-black text-gray-400 hover:text-white transition-colors uppercase tracking-widest">Rankings</a>
        <a href="/specialist"
            class="text-xs font-black text-gray-400 hover:text-white transition-colors uppercase tracking-widest">Specialists</a>
        <a href="/competitions" class="text-xs font-black nav-active uppercase tracking-widest">Competitions</a>
    </nav>

    <main
        class="max-w-5xl w-full mx-auto glass-panel rounded-b-2xl p-4 sm:p-10 space-y-10 border-x border-b border-red-900/20">

        <header class="text-center">
            <h1 class="afterglow-title text-5xl sm:text-7xl mb-4">
                SAME <span class="brand-tag">AS ALWAYS</span>
            </h1>
            <p class="text-gray-500 text-xs font-bold uppercase tracking-[0.4em] italic">Afterglow Competition Explorer
            </p>
        </header>

        <!-- Event Selection -->
        <div class="space-y-6">
            <h3 class="text-center text-[10px] font-black uppercase tracking-[0.3em] text-red-600/60">Target Event
                Combos</h3>
            <div id="event-selector" class="flex flex-wrap justify-center gap-3"></div>
        </div>

        <!-- Controls -->
        <div
            class="flex flex-col items-center gap-8 bg-[#0f0f0f] p-8 rounded-2xl border border-red-900/10 shadow-inner">
            <label for="match-mode-toggle" class="flex items-center cursor-pointer group">
                <div class="relative">
                    <input type="checkbox" id="match-mode-toggle" class="sr-only">
                    <div class="block bg-black w-14 h-8 rounded-full border border-gray-800"></div>
                    <div class="dot absolute left-1 top-1 bg-gray-700 w-6 h-6 rounded-full transition transform"></div>
                </div>
                <div class="ml-4">
                    <span id="match-mode-label"
                        class="font-black text-xs uppercase tracking-widest text-gray-500 select-none group-hover:text-red-500 transition-colors">
                        Inclusive Match (Default)
                    </span>
                </div>
            </label>

            <button id="find-btn"
                class="w-full sm:w-auto bg-red-700 hover:bg-red-600 active:scale-95 text-white font-black py-4 px-16 rounded-sm shadow-[4px_4px_0px_#000] border-2 border-black transition-all uppercase tracking-tighter text-xl">
                SEARCH DATA
            </button>
        </div>

        <!-- Loading / Results -->
        <div id="loading-spinner" class="hidden flex flex-col items-center py-10 gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-red-600 border-r-transparent"></div>
            <p class="text-red-600 font-black uppercase tracking-widest text-[10px] animate-pulse">Synchronizing with
                WCA Database...</p>
        </div>

        <div id="results-container" class="min-h-[100px] flex flex-col items-center">
            <p id="error-message"
                class="text-red-500 font-black uppercase text-xs tracking-widest hidden p-6 text-center bg-red-950/20 rounded-xl border border-red-900/50 w-full">
            </p>
            <div id="no-data-message"
                class="hidden text-center py-20 bg-black rounded-3xl border border-dashed border-red-900/20 w-full">
                <p class="text-gray-600 font-black uppercase tracking-widest text-sm">No sessions found for this combo.
                </p>
            </div>
        </div>
    </main>

    <footer
        class="w-full max-w-5xl mx-auto text-center text-gray-700 text-[10px] mt-8 pb-8 font-black uppercase tracking-[0.5em]">
        <p>© 2026 Wiigii's WCA • Afterglow Edition</p>
    </footer>

    <script>
        const EVENT_ICONS = {
            "333": '<span class="cubing-icon event-333 event-icon"></span>',
            "222": '<span class="cubing-icon event-222 event-icon"></span>',
            "444": '<span class="cubing-icon event-444 event-icon"></span>',
            "555": '<span class="cubing-icon event-555 event-icon"></span>',
            "666": '<span class="cubing-icon event-666 event-icon"></span>',
            "777": '<span class="cubing-icon event-777 event-icon"></span>',
            "333oh": '<span class="cubing-icon event-333oh event-icon"></span>',
            "333bf": '<span class="cubing-icon event-333bf event-icon"></span>',
            "333fm": '<span class="cubing-icon event-333fm event-icon"></span>',
            "clock": '<span class="cubing-icon event-clock event-icon"></span>',
            "minx": '<span class="cubing-icon event-minx event-icon"></span>',
            "pyram": '<span class="cubing-icon event-pyram event-icon"></span>',
            "skewb": '<span class="cubing-icon event-skewb event-icon"></span>',
            "sq1": '<span class="cubing-icon event-sq1 event-icon"></span>',
            "444bf": '<span class="cubing-icon event-444bf event-icon"></span>',
            "555bf": '<span class="cubing-icon event-555bf event-icon"></span>',
            "333mbf": '<span class="cubing-icon event-333mbf event-icon"></span>'
        };

        let selectedEvents = [];
        const eventSelector = document.getElementById("event-selector");
        const findBtn = document.getElementById("find-btn");
        const matchModeToggle = document.getElementById("match-mode-toggle");
        const matchModeLabel = document.getElementById("match-mode-label");
        const resultsContainer = document.getElementById("results-container");
        const spinner = document.getElementById("loading-spinner");
        const errorMsg = document.getElementById("error-message");
        const noData = document.getElementById("no-data-message");

        // UI Initialization
        Object.entries(EVENT_ICONS).forEach(([id, icon]) => {
            const btn = document.createElement("button");
            btn.className = "bg-[#111] hover:border-red-900 text-gray-400 rounded-lg p-3 border border-gray-800 transition-all active:scale-90 flex items-center justify-center";
            btn.innerHTML = icon;
            btn.onclick = () => {
                btn.classList.toggle("event-btn-active");
                btn.classList.toggle("text-white");
                selectedEvents.includes(id) ? selectedEvents = selectedEvents.filter(e => e !== id) : selectedEvents.push(id);
            };
            eventSelector.appendChild(btn);
        });

        matchModeToggle.onchange = () => {
            matchModeLabel.textContent = matchModeToggle.checked ? "Exact Match Mode" : "Inclusive Match Mode";
            matchModeLabel.classList.toggle("text-red-500", matchModeToggle.checked);
        };

        const formatDate = (c) => {
            if (!c.date || !c.date.from) return "TBA";
            const start = new Date(c.date.from);
            return start.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();
        };

        findBtn.onclick = async () => {
            if (selectedEvents.length === 0) {
                errorMsg.textContent = "SELECT AT LEAST ONE EVENT.";
                errorMsg.classList.remove("hidden");
                return;
            }

            spinner.classList.remove("hidden");
            errorMsg.classList.add("hidden");
            noData.classList.add("hidden");
            resultsContainer.querySelectorAll(".dynamic-result").forEach(el => el.remove());

            const partial = matchModeToggle.checked ? 'false' : 'true';

            try {
                const res = await fetch(`/competitions?events=${selectedEvents.join(",")}&partial=${partial}`);
                const data = await res.json();

                if (data.length === 0) {
                    noData.classList.remove("hidden");
                    return;
                }

                const html = `
                    <div class="w-full dynamic-result mt-6">
                        <div class="hidden md:block overflow-hidden rounded-xl border border-red-900/20 bg-black">
                            <table class="w-full text-left">
                                <thead class="bg-[#151515] border-b border-red-900/30">
                                    <tr>
                                        <th class="px-6 py-4 text-[10px] font-black text-red-600 uppercase tracking-widest">Competition</th>
                                        <th class="px-6 py-4 text-[10px] font-black text-gray-600 uppercase tracking-widest">Location</th>
                                        <th class="px-6 py-4 text-[10px] font-black text-gray-600 uppercase tracking-widest">Date</th>
                                        <th class="px-6 py-4 text-[10px] font-black text-gray-600 uppercase tracking-widest">Events</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-[#111]">
                                    ${data.map(c => `
                                        <tr class="hover:bg-red-950/10 transition-colors">
                                            <td class="px-6 py-5">
                                                <a href="https://www.worldcubeassociation.org/competitions/${c.id}" target="_blank" class="font-black text-gray-200 comp-link uppercase tracking-tighter">${c.name}</a>
                                            </td>
                                            <td class="px-6 py-5 text-xs font-bold text-gray-500 uppercase">${c.city}, ${c.country}</td>
                                            <td class="px-6 py-5 text-xs font-bold text-red-700/80">${formatDate(c)}</td>
                                            <td class="px-6 py-5">
                                                <div class="scrollable-events">${c.events.map(e => EVENT_ICONS[e] || '').join("")}</div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                        <!-- Mobile View -->
                        <div class="md:hidden space-y-4">
                            ${data.map(c => `
                                <div class="bg-black border border-red-900/20 rounded-xl p-6">
                                    <a href="https://www.worldcubeassociation.org/competitions/${c.id}" target="_blank" class="text-lg font-black text-red-600 uppercase tracking-tighter block mb-2">${c.name}</a>
                                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">📍 ${c.city}, ${c.country} • 📅 ${formatDate(c)}</p>
                                    <div class="flex flex-wrap gap-1 border-t border-[#111] pt-4">${c.events.map(e => EVENT_ICONS[e] || '').join("")}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                resultsContainer.insertAdjacentHTML("beforeend", html);
            } catch (e) {
                errorMsg.textContent = "DATABASE OFFLINE.";
                errorMsg.classList.remove("hidden");
            } finally {
                spinner.classList.add("hidden");
            }
        };
    </script>
</body>

</html>
