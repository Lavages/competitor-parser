<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competition Finder • Afterglow Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.cubing.net/v0/css/@cubing/icons/css">
    <style>
        :root {
            --afterglow-red: #e60012;
            --afterglow-pink: #ff007f;
            --afterglow-black: #0f0f0f;
            --afterglow-dark: #1a1a1a;
            --afterglow-gray: #333333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--afterglow-black);
            background-image:
                linear-gradient(rgba(15, 15, 15, 0.9), rgba(15, 15, 15, 0.9)),
                url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            color: #eeeeee;
        }

        .nav-active {
            color: var(--afterglow-pink) !important;
            border-bottom: 4px solid var(--afterglow-pink);
            padding-bottom: 4px;
        }

        .brand-logo {
            font-weight: 900;
            font-size: 2.8rem;
            letter-spacing: -2px;
            text-transform: uppercase;
            font-style: italic;
            color: white;
            text-shadow: 3px 3px 0px var(--afterglow-pink);
        }

        .brand-tag {
            background-color: var(--afterglow-pink);
            color: black;
            padding: 2px 12px;
            margin-left: 6px;
            transform: skewX(-15deg);
            display: inline-block;
            font-style: normal;
        }

        .event-btn {
            border: 2px solid var(--afterglow-gray);
            transition: all 0.2s;
        }

        .event-btn.active {
            background-color: var(--afterglow-pink) !important;
            color: black !important;
            border-color: white !important;
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }

        .find-btn {
            background: linear-gradient(90deg, var(--afterglow-red), #900000);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            clip-path: polygon(0% 15%, 95% 0%, 100% 85%, 5% 100%);
            transition: all 0.2s;
        }

        .results-card {
            background-color: #1a1a1a;
            border-right: 6px solid var(--afterglow-pink);
        }

        /* Toggle Switch Logic */
        .toggle-dot {
            transition: all 0.3s ease-in-out;
        }

        input:checked~.toggle-dot {
            transform: translateX(100%);
            background-color: var(--afterglow-pink);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--afterglow-pink);
        }
    </style>
</head>

<body class="min-h-screen p-2 sm:p-4 flex flex-col items-center">
    <nav
        class="w-full max-w-5xl mx-auto bg-[#1b1b1b] p-4 flex justify-center items-center gap-10 sticky top-0 z-50 border-b-2 border-[#ff007f] backdrop-blur-md">
        <a href="/"
            class="text-sm text-gray-400 hover:text-[#ff007f] font-black uppercase tracking-tighter transition-all">Competitors</a>
        <a href="/specialist"
            class="text-sm text-gray-400 hover:text-[#ff007f] font-black uppercase tracking-tighter transition-all">Specialist</a>
        <a href="/competitions" class="text-sm font-black nav-active uppercase tracking-tighter">Competitions</a>
    </nav>

    <main class="max-w-5xl w-full mx-auto p-4 sm:p-10 space-y-12">
        <header class="text-center">
            <h1 class="brand-logo">Tourney<span class="brand-tag">Pulse</span></h1>
            <p class="text-pink-500 text-xs font-black uppercase tracking-[0.3em] mt-2 italic">Chasing the pink horizon
            </p>
        </header>

        <div class="bg-[#151515] p-8 rounded-none border-r-8 border-[#ff007f] space-y-8 shadow-xl">
            <div id="event-selector" class="flex flex-wrap justify-center gap-4"></div>

            <div class="flex flex-col items-center gap-4">
                <!-- Toggle Switch -->
                <div class="flex items-center gap-3">
                    <span class="text-xs font-black uppercase italic text-gray-400">Exact Match</span>
                    <label for="partial-toggle" class="flex items-center cursor-pointer">
                        <div class="relative">
                            <input type="checkbox" id="partial-toggle" class="sr-only" checked>
                            <div class="block bg-gray-800 w-10 h-6 rounded-full"></div>
                            <div class="toggle-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition">
                            </div>
                        </div>
                    </label>
                    <span class="text-xs font-black uppercase italic text-pink-500">Inclusive</span>
                </div>

                <button id="find-btn" class="find-btn py-4 px-16 text-xl active:scale-95">
                    Scan Events
                </button>
            </div>
        </div>

        <div id="loading-spinner" class="hidden flex flex-col justify-center items-center py-10 gap-4">
            <div class="animate-ping h-8 w-8 bg-pink-600 rounded-full shadow-lg"></div>
            <span class="font-black text-pink-500 uppercase italic">Syncing with Registry...</span>
        </div>

        <div id="results-container"
            class="results-card overflow-hidden min-h-[100px] flex flex-col items-center justify-center">
            <p id="no-data-message" class="text-gray-500 font-black uppercase p-8 hidden italic">No venues found in this
                frequency.</p>
        </div>
    </main>

    <footer
        class="w-full max-w-5xl mx-auto text-center text-gray-600 text-xs mt-8 pb-8 font-bold border-t border-gray-800 pt-4">
        <p>Wiigii's WCA Tools x <span style="color: var(--afterglow-pink)">Afterglow</span> • 2026</p>
    </footer>

    <script>
        const EVENT_ICONS = {
            "333": "event-333", "222": "event-222", "444": "event-444", "555": "event-555",
            "666": "event-666", "777": "event-777", "333oh": "event-333oh", "333bf": "event-333bf",
            "333fm": "event-333fm", "clock": "event-clock", "minx": "event-minx", "pyram": "event-pyram",
            "skewb": "event-skewb", "sq1": "event-sq1", "444bf": "event-444bf", "555bf": "event-555bf",
            "333mbf": "event-333mbf"
        };

        let selectedEvents = [];
        const eventSelector = document.getElementById("event-selector");

        Object.entries(EVENT_ICONS).forEach(([id, iconClass]) => {
            const btn = document.createElement("button");
            btn.className = "event-btn bg-[#1b1b1b] p-3 transition-all";
            btn.innerHTML = `<span class="cubing-icon ${iconClass} text-2xl"></span>`;
            btn.addEventListener("click", () => {
                btn.classList.toggle("active");
                selectedEvents = selectedEvents.includes(id) ? selectedEvents.filter(e => e !== id) : [...selectedEvents, id];
            });
            eventSelector.appendChild(btn);
        });

        document.getElementById("find-btn").addEventListener("click", async () => {
            const container = document.getElementById("results-container");
            const isPartial = document.getElementById("partial-toggle").checked;

            document.getElementById("loading-spinner").classList.remove("hidden");
            document.getElementById("no-data-message").classList.add("hidden");
            container.querySelectorAll(".results-data").forEach(el => el.remove());

            try {
                // Exact switch handled by the boolean 'partial' query param
                const url = `/competitions?events=${selectedEvents.join(",")}&partial=${isPartial}`;
                const res = await fetch(url);
                const comps = await res.json();

                if (!comps.length) {
                    document.getElementById("no-data-message").classList.remove("hidden");
                    return;
                }

                const html = `
                    <div class="w-full results-data">
                        <table class="w-full text-left">
                            <thead class="bg-[#ff007f] text-black">
                                <tr>
                                    <th class="p-4 text-xs font-black uppercase italic">Date</th>
                                    <th class="p-4 text-xs font-black uppercase italic">Competition</th>
                                    <th class="p-4 text-xs font-black uppercase italic">Location</th>
                                    <th class="p-4 text-xs font-black uppercase italic">Events</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-800">
                                ${comps.map(c => `
                                    <tr class="hover:bg-pink-500/10 transition-colors">
                                        <td class="p-4 font-bold text-pink-500 text-xs">${c.date.from}</td>
                                        <td class="p-4 font-black text-white uppercase italic">
                                            <a href="https://www.worldcubeassociation.org/competitions/${c.id}" target="_blank" class="hover:underline">${c.name}</a>
                                        </td>
                                        <td class="p-4 text-gray-400 text-xs font-bold">${c.city}, ${c.country}</td>
                                        <td class="p-4">
                                            <div class="flex gap-2 flex-wrap">
                                                ${c.events.map(e => `<span class="cubing-icon event-${e} text-lg text-gray-500"></span>`).join("")}
                                            </div>
                                        </td>
                                    </tr>
                                `).join("")}
                            </tbody>
                        </table>
                    </div>`;
                container.insertAdjacentHTML("beforeend", html);
            } catch (err) {
                console.error("Fetch error:", err);
            } finally { document.getElementById("loading-spinner").classList.add("hidden"); }
        });
    </script>
</body>

</html>
