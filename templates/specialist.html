<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specialist Finder • Afterglow Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.cubing.net/v0/css/@cubing/icons/css">
    <style>
        :root {
            --afterglow-red: #e60012;
            --afterglow-gold: #ffcc00;
            --afterglow-black: #0f0f0f;
            --afterglow-dark: #1a1a1a;
            --afterglow-gray: #333333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--afterglow-black);
            background-image:
                linear-gradient(rgba(15, 15, 15, 0.9), rgba(15, 15, 15, 0.9)),
                url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            color: #eeeeee;
        }

        .nav-active {
            color: var(--afterglow-red) !important;
            border-bottom: 4px solid var(--afterglow-red);
            padding-bottom: 4px;
        }

        .brand-logo {
            font-weight: 900;
            font-size: 2.8rem;
            letter-spacing: -2px;
            text-transform: uppercase;
            font-style: italic;
            color: white;
            text-shadow: 3px 3px 0px var(--afterglow-red);
        }

        .brand-tag {
            background-color: var(--afterglow-gold);
            color: black;
            padding: 2px 12px;
            margin-left: 6px;
            transform: skewX(-15deg);
            display: inline-block;
            font-style: normal;
        }

        .event-btn {
            border: 2px solid var(--afterglow-gray);
            transition: all 0.2s;
        }

        .event-btn.active {
            background-color: var(--afterglow-gold) !important;
            color: black !important;
            border-color: white !important;
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .find-btn {
            background: linear-gradient(90deg, var(--afterglow-red), #900000);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            clip-path: polygon(0% 15%, 95% 0%, 100% 85%, 5% 100%);
            transition: all 0.2s;
        }

        .find-btn:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        /* Specialist Counter Badge */
        .event-wrapper {
            position: relative;
            display: inline-block;
            padding: 4px;
        }

        .counter-badge {
            position: absolute;
            top: -2px;
            right: -4px;
            background-color: var(--afterglow-red);
            color: white;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 1px 5px;
            border: 1px solid white;
            transform: rotate(5deg);
        }

        .results-card {
            background-color: #1a1a1a;
            border-right: 6px solid var(--afterglow-gold);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--afterglow-gold);
        }
    </style>
</head>

<body class="min-h-screen p-2 sm:p-4 flex flex-col items-center">
    <nav
        class="w-full max-w-5xl mx-auto bg-[#1b1b1b] p-4 flex justify-center items-center gap-10 sticky top-0 z-50 border-b-2 border-yellow-500 backdrop-blur-md">
        <a href="/"
            class="text-sm text-gray-400 hover:text-yellow-500 font-black uppercase tracking-tighter transition-all">Competitors</a>
        <a href="/specialist" class="text-sm font-black nav-active uppercase tracking-tighter">Specialist</a>
    </nav>

    <main class="max-w-5xl w-full mx-auto p-4 sm:p-10 space-y-12">
        <header class="text-center">
            <h1 class="brand-logo">Specialist<span class="brand-tag">Finder</span></h1>
            <p class="text-red-500 text-xs font-black uppercase tracking-[0.3em] mt-2 italic">Tie our burning hearts
                together</p>
        </header>

        <div class="bg-[#151515] p-8 rounded-none border-r-8 border-yellow-500 space-y-8 shadow-xl">
            <div id="event-selector" class="flex flex-wrap justify-center gap-4"></div>
            <div class="flex justify-center">
                <button id="find-btn" class="find-btn py-4 px-16 text-xl active:scale-95">
                    Search
                </button>
            </div>
        </div>

        <div id="loading-spinner" class="hidden flex flex-col justify-center items-center py-10 gap-4">
            <div class="animate-bounce h-12 w-12 bg-red-600 rounded-full shadow-lg"></div>
            <span class="font-black text-yellow-500 uppercase italic">Amplifying Signal...</span>
        </div>

        <div id="results-container"
            class="results-card overflow-hidden min-h-[100px] flex flex-col items-center justify-center">
            <p id="no-data-message" class="text-gray-500 font-black uppercase p-8 hidden italic">No specialists found in
                the backstage.</p>
        </div>
    </main>

    <footer
        class="w-full max-w-5xl mx-auto text-center text-gray-600 text-xs mt-8 pb-8 font-bold border-t border-gray-800 pt-4">
        <p>Wiigii's WCA Tools x <span style="color: var(--afterglow-gold)">Afterglow</span> • 2026</p>
    </footer>

    <script>
        const EVENT_ICONS = {
            "333": "event-333", "222": "event-222", "444": "event-444", "555": "event-555",
            "666": "event-666", "777": "event-777", "333oh": "event-333oh", "333bf": "event-333bf",
            "333fm": "event-333fm", "clock": "event-clock", "minx": "event-minx", "pyram": "event-pyram",
            "skewb": "event-skewb", "sq1": "event-sq1", "444bf": "event-444bf", "555bf": "event-555bf",
            "333mbf": "event-333mbf"
        };

        let selectedEvents = [];
        const eventSelector = document.getElementById("event-selector");
        Object.entries(EVENT_ICONS).forEach(([id, iconClass]) => {
            const btn = document.createElement("button");
            btn.className = "event-btn bg-[#1b1b1b] p-3 transition-all";
            btn.innerHTML = `<span class="cubing-icon ${iconClass} text-2xl"></span>`;
            btn.addEventListener("click", () => {
                btn.classList.toggle("active");
                selectedEvents = selectedEvents.includes(id) ? selectedEvents.filter(e => e !== id) : [...selectedEvents, id];
            });
            eventSelector.appendChild(btn);
        });

        function renderPodiums(podiums) {
            return podiums.map(p => {
                return `
                    <div class="event-wrapper">
                        <span class="cubing-icon event-${p.eventId} text-2xl text-red-500"></span>
                        <span class="counter-badge">${p.count}</span>
                    </div>`;
            }).join("");
        }

        document.getElementById("find-btn").addEventListener("click", async () => {
            const container = document.getElementById("results-container");
            if (selectedEvents.length === 0) return;
            document.getElementById("loading-spinner").classList.remove("hidden");
            document.getElementById("no-data-message").classList.add("hidden");
            container.querySelectorAll(".results-data").forEach(el => el.remove());

            try {
                const res = await fetch(`/api/specialists?events=${selectedEvents.join(",")}`);
                const specialists = await res.json();
                if (!specialists.length) { document.getElementById("no-data-message").classList.remove("hidden"); return; }

                const html = `
                    <div class="w-full results-data">
                        <table class="w-full text-left">
                            <thead class="bg-yellow-500 text-black">
                                <tr>
                                    <th class="p-4 text-xs font-black uppercase italic">Specialist</th>
                                    <th class="p-4 text-xs font-black uppercase italic">Region</th>
                                    <th class="p-4 text-xs font-black uppercase italic">Podium Count</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-800">
                                ${specialists.map(s => `
                                    <tr class="hover:bg-yellow-500/10 transition-colors">
                                        <td class="p-4 font-black text-white uppercase italic">${s.personName}</td>
                                        <td class="p-4 text-gray-400 font-bold">${s.personCountryId}</td>
                                        <td class="p-4"><div class="flex gap-4 flex-wrap">${renderPodiums(s.podiums)}</div></td>
                                    </tr>
                                `).join("")}
                            </tbody>
                        </table>
                    </div>`;
                container.insertAdjacentHTML("beforeend", html);
            } finally { document.getElementById("loading-spinner").classList.add("hidden"); }
        });
    </script>
</body>

</html>
